<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextVocab Pro - 雅思真题词库版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const BOOK_CONFIG = {
            "IELTS": { title: "雅思词汇念念不忘版", desc: "归类核心语义簇，融合牛津高阶精炼释义与真题学术语境", file: "ielts.json" }
        };

        function HighlightedSentence({ sentence }) {
            const parts = sentence.split(/(\*\*.*?\*\*)/g);
            return (
                <p className="text-2xl md:text-3xl font-medium text-slate-700 leading-relaxed tracking-wide text-center select-none px-4">
                    {parts.map((part, i) => {
                        if (part.startsWith('**') && part.endsWith('**')) {
                            const word = part.slice(2, -2);
                            return <span key={i} className="text-emerald-500 font-bold border-b-4 border-emerald-400 mx-1 px-1 bg-emerald-50/50 rounded">{word}</span>;
                        }
                        return part;
                    })}
                </p>
            );
        }

        function App() {
            const [view, setView] = React.useState('home'); 
            const [allWords, setAllWords] = React.useState([]);
            const [reviewQueue, setReviewQueue] = React.useState([]);
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [activeSenseIndex, setActiveSenseIndex] = React.useState(0);
            const [showFullDetail, setShowFullDetail] = React.useState(false);
            const [hasTriggeredUnknown, setHasTriggeredUnknown] = React.useState(false);
            const [swipeDirection, setSwipeDirection] = React.useState('none');
            const [loading, setLoading] = React.useState(false);
            const [groupStartIndex, setGroupStartIndex] = React.useState(0);

            const currentWord = reviewQueue[currentIndex];

            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (view !== 'review' || loading) return;
                    if (!showFullDetail) {
                        if (e.key === 'ArrowLeft') triggerDecision(false);
                        if (e.key === 'ArrowRight') triggerDecision(true);
                    } else {
                        if (e.key === 'ArrowRight') handleNextAction();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, currentIndex, activeSenseIndex, showFullDetail, currentWord, loading, hasTriggeredUnknown]);

            const startReview = async (bookKey) => {
                setLoading(true);
                try {
                    const response = await fetch(BOOK_CONFIG[bookKey].file);
                    if (!response.ok) throw new Error("加载词库失败！请确保下载的远程 JSON 词库文件重命名为 [ielts.json] 并与本网页文件放在同一个文件夹下。");
                    const wordsData = await response.json();
                    
                    const shuffled = [...wordsData].sort(() => 0.5 - Math.random());
                    setAllWords(shuffled);
                    
                    const firstGroup = shuffled.slice(0, 10);

                    setReviewQueue(firstGroup);
                    setGroupStartIndex(0);
                    setCurrentIndex(0);
                    setActiveSenseIndex(0);
                    setShowFullDetail(false);
                    setHasTriggeredUnknown(false);
                    setSwipeDirection('none');
                    setView('review');
                } catch (error) {
                    alert(error.message + "\n\n💡 提示：本地浏览器有跨域限制，直接双击 HTML 打开无法载入本地 JSON。部署至 Vercel 或 GitHub Pages 后即可无错运行！");
                }
                setLoading(false);
            };

            const triggerDecision = (isKnown) => {
                setSwipeDirection(isKnown ? 'right' : 'left');
                setTimeout(() => {
                    setSwipeDirection('none');
                    if (!isKnown) {
                        setHasTriggeredUnknown(true);
                    }
                    // 展现当前这一个合并义项的单独详情
                    setShowFullDetail(true);
                }, 180);
            };

            // 核心控制流：决定是切到下一个“核心意思”，还是切到下一个“单词”
            const handleNextAction = () => {
                // 如果当前单词还有其他独立归类的语义簇没看完
                if (activeSenseIndex < currentWord.senses.length - 1) {
                    setActiveSenseIndex(prev => prev + 1);
                    setShowFullDetail(false);
                    // 注意：保持当前词的错词标记状态，直到这个词所有意思过完
                } else {
                    // 当前词的所有归类意思全部看完了，判断是否需要丢到队尾重记
                    if (hasTriggeredUnknown) {
                        setReviewQueue(prev => [...prev, { ...currentWord }]);
                    }

                    // 步进到下一个单词
                    if (currentIndex < reviewQueue.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                        setActiveSenseIndex(0);
                        setShowFullDetail(false);
                        setHasTriggeredUnknown(false);
                    } else {
                        // 10个单词的队列（含重记词）全部清空
                        setView('group_complete');
                    }
                }
            };

            const loadNextGroup = () => {
                const nextStartIndex = groupStartIndex + 10;
                if (nextStartIndex >= allWords.length) {
                    alert("🎉 全量雅思核心词库复习大圆满！");
                    setView('home');
                    return;
                }
                const nextGroup = allWords.slice(nextStartIndex, nextStartIndex + 10);
                setReviewQueue(nextGroup);
                setGroupStartIndex(nextStartIndex);
                setCurrentIndex(0);
                setActiveSenseIndex(0);
                setShowFullDetail(false);
                setHasTriggeredUnknown(false);
                setView('review');
            };

            let cardStyle = "bg-white border-slate-100 shadow-xl";
            if (swipeDirection === 'left') cardStyle = "bg-red-50 border-red-300 scale-[0.98] shadow-md";
            if (swipeDirection === 'right') cardStyle = "bg-emerald-50 border-emerald-300 scale-[0.98] shadow-md";

            return (
                <div className="min-h-screen flex flex-col justify-between bg-gradient-to-b from-slate-50 to-slate-100">
                    <header className="max-w-5xl w-full mx-auto px-6 py-6 flex justify-between items-center">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white font-bold animate-pulse">I</div>
                            <span className="text-xl font-bold tracking-tight text-slate-800">IELTS ContextVocab</span>
                        </div>
                        <div className="text-xs font-medium text-slate-400 bg-slate-200/60 px-3 py-1 rounded-full">
                            核心语义提炼版
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center px-4 max-w-2xl w-full mx-auto">
                        {view === 'home' && (
                            <div className="w-full space-y-6 py-12 animate-fade-in">
                                <div className="text-center space-y-2">
                                    <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">雅思真题全语境刷词系统</h1>
                                    <p className="text-slate-500 text-sm">拒绝盲目罗列多义词，将相近释义合并归类，打造最高效的科学语义簇记忆法</p>
                                </div>
                                <div className="grid gap-4 pt-4">
                                    {Object.keys(BOOK_CONFIG).map((key) => (
                                        <div key={key} onClick={() => !loading && startReview(key)} className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:border-emerald-400 hover:shadow-md cursor-pointer transition-all active:scale-[0.99]">
                                            <div className="flex justify-between items-start">
                                                <h3 className="text-lg font-bold text-slate-800">{BOOK_CONFIG[key].title}</h3>
                                                <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 font-bold rounded">10词一组</span>
                                            </div>
                                            <p className="text-xs text-slate-400 mt-2">{loading ? "⚡ 正在极速解析学术级牛津海量真题语境..." : BOOK_CONFIG[key].desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'review' && currentWord && (
                            <div className="w-full flex flex-col items-center space-y-6 py-4 animate-fade-in">
                                <div className="w-full text-center text-xs font-semibold text-slate-400 tracking-wider flex justify-between px-2">
                                    <span>本组单词进度：{currentIndex + 1} / {reviewQueue.length}</span>
                                    <span>核心语义簇：{activeSenseIndex + 1} / {currentWord.senses.length}</span>
                                </div>

                                <div className="w-full min-h-[360px] flex items-center justify-center">
                                    {!showFullDetail ? (
                                        <div className={`w-full rounded-3xl p-8 md:p-12 border min-h-[340px] flex flex-col justify-center items-center relative transition-all duration-150 ${cardStyle}`}>
                                            <HighlightedSentence sentence={currentWord.senses[activeSenseIndex].sentence} />
                                            <div className="absolute bottom-4 text-xs text-slate-400 select-none flex space-x-12">
                                                <span>← 键盘左键: 不认识</span>
                                                <span>键盘右键: 认识 →</span>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="w-full bg-white rounded-3xl p-8 shadow-md border border-slate-100 space-y-6 animate-fade-in">
                                            <div className="flex items-baseline space-x-3 border-b border-slate-100 pb-4">
                                                <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight">{currentWord.word}</h2>
                                                <span className="text-sm font-mono bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{currentWord.phonetic || "/暂无音标/"}</span>
                                            </div>

                                            <div className="space-y-4">
                                                {(() => {
                                                    const currentSense = currentWord.senses[activeSenseIndex] || currentWord.senses[0];
                                                    return (
                                                        <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100 space-y-4 animate-fade-in">
                                                            <div className="flex items-start space-x-2">
                                                                <span className="text-[10px] font-bold px-1.5 py-0.5 bg-emerald-500 text-white rounded mt-0.5 shrink-0">当前核心语义</span>
                                                                <p className="text-sm font-bold text-slate-800 leading-snug">{currentSense.definition}</p>
                                                            </div>
                                                            <div className="space-y-1.5 border-l-2 border-emerald-400 pl-3">
                                                                <p className="text-xs text-slate-400 font-medium">牛津同步例句：</p>
                                                                <p className="text-sm text-slate-600 italic font-serif leading-relaxed">
                                                                    “ {currentSense.sentence.replace(/\*\*/g, '')} ”
                                                                </p>
                                                            </div>
                                                            <div className="pl-3 text-xs text-slate-500">
                                                                <span className="font-medium text-slate-400">释义翻译：</span>{currentSense.translation}
                                                            </div>
                                                        </div>
                                                    );
                                                })()}
                                            </div>

                                            <button 
                                                onClick={handleNextAction}
                                                className="w-full h-14 rounded-2xl bg-slate-900 hover:bg-slate-800 text-white font-semibold tracking-wide shadow-lg transition-all active:scale-[0.99]"
                                            >
                                                {activeSenseIndex < currentWord.senses.length - 1 ? "查看该词下一个核心核心意思 →" : "下一个单词 (或按键盘 → 键) →"}
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {!showFullDetail && (
                                    <div className="grid grid-cols-2 gap-4 w-full max-w-sm pt-2">
                                        <button onClick={() => triggerDecision(false)} className="h-12 rounded-xl bg-red-50 hover:bg-red-100 text-red-600 font-medium border border-red-200 transition-colors shadow-sm">
                                            不认识 (←)
                                        </button>
                                        <button onClick={() => triggerDecision(true)} className="h-12 rounded-xl bg-emerald-50 hover:bg-emerald-100 text-emerald-600 font-medium border border-emerald-200 transition-colors shadow-sm">
                                            认识 (→)
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'group_complete' && (
                            <div className="w-full bg-white rounded-3xl p-8 md:p-12 shadow-xl border border-slate-100 text-center space-y-8 animate-fade-in">
                                <div className="space-y-3">
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-3xl mx-auto">✓</div>
                                    <h2 className="text-2xl font-black text-slate-900">这一组单词搞定啦！</h2>
                                    <p className="text-slate-400 text-sm">当前 10 个词的独立归类意项群已完美闭环</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                    <button 
                                        onClick={() => setView('home')}
                                        className="h-14 px-8 rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold transition-colors active:scale-[0.99]"
                                    >
                                        返回主页
                                    </button>
                                    <button 
                                        onClick={loadNextGroup}
                                        className="h-14 px-8 rounded-2xl bg-emerald-500 hover:bg-emerald-600 text-white font-semibold shadow-lg shadow-emerald-200 transition-colors active:scale-[0.99]"
                                    >
                                        开始下一组 →
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
