<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextVocab Pro - 雅思全量真题词库版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sentence-oneline {
            white-space: nowrap;
            overflow-x: auto;
            max-width: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const BOOK_CONFIG = {
            "IELTS": { title: "雅思词汇念念不忘版", desc: "完整收录 5,382 个核心词汇，按义项归类配牛津风格例句", file: "ielts.json" }
        };

        function HighlightedSentence({ sentence, size = 'lg' }) {
            const parts = sentence.split(/(\*\*.*?\*\*)/g);
            const sizeClass = size === 'lg'
                ? 'text-xl md:text-2xl font-medium text-slate-700 tracking-wide'
                : 'text-lg md:text-xl font-medium text-slate-600 tracking-wide';
            return (
                <p className={`${sizeClass} sentence-oneline text-center select-none px-2 no-scrollbar`}>
                    {parts.map((part, i) => {
                        if (part.startsWith('**') && part.endsWith('**')) {
                            const word = part.slice(2, -2);
                            return <span key={i} className="text-emerald-500 font-bold border-b-4 border-emerald-400 mx-0.5 px-1 bg-emerald-50/50 rounded inline">{word}</span>;
                        }
                        return <span key={i}>{part}</span>;
                    })}
                </p>
            );
        }

        function App() {
            const [view, setView] = React.useState('home');
            const [reviewQueue, setReviewQueue] = React.useState([]);
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [activeSenseIndex, setActiveSenseIndex] = React.useState(0);
            const [phase, setPhase] = React.useState('quiz');
            const [needsReview, setNeedsReview] = React.useState(false);
            const [swipeDirection, setSwipeDirection] = React.useState('none');
            const [loading, setLoading] = React.useState(false);

            const currentWord = reviewQueue[currentIndex];
            const currentSense = currentWord?.senses?.[activeSenseIndex];

            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (view !== 'review' || loading || !currentWord) return;
                    if (phase === 'quiz') {
                        if (e.key === 'ArrowLeft') handleQuizDecision(false);
                        if (e.key === 'ArrowRight') handleQuizDecision(true);
                    } else if (phase === 'reveal') {
                        if (e.key === 'ArrowLeft') handleRevealDecision(false);
                        if (e.key === 'ArrowRight') handleRevealDecision(true);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, currentIndex, activeSenseIndex, phase, currentWord, loading, needsReview]);

            const startReview = async (bookKey) => {
                setLoading(true);
                try {
                    const response = await fetch(BOOK_CONFIG[bookKey].file);
                    if (!response.ok) throw new Error("加载词库失败！请确保 ielts.json 与本网页文件放在同一文件夹下。");
                    const wordsData = await response.json();
                    const shuffled = [...wordsData].sort(() => 0.5 - Math.random());
                    setReviewQueue(shuffled);
                    setCurrentIndex(0);
                    setActiveSenseIndex(0);
                    setPhase('quiz');
                    setNeedsReview(false);
                    setSwipeDirection('none');
                    setView('review');
                } catch (error) {
                    alert(error.message + "\n\n💡 提示：因浏览器跨域限制，直接双击 HTML 可能无法加载词库。请部署到 Vercel 或 GitHub Pages 后使用。");
                }
                setLoading(false);
            };

            const advanceSenseOrWord = (shouldRequeue) => {
                const requeue = needsReview || shouldRequeue;
                if (activeSenseIndex < currentWord.senses.length - 1) {
                    setActiveSenseIndex(prev => prev + 1);
                    setPhase('quiz');
                    setNeedsReview(requeue);
                } else {
                    if (requeue) {
                        setReviewQueue(prev => [...prev, { ...currentWord }]);
                    }
                    if (currentIndex < reviewQueue.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                        setActiveSenseIndex(0);
                        setPhase('quiz');
                        setNeedsReview(false);
                    } else {
                        alert("🎉 太棒了！本轮词库复习完成！");
                        setView('home');
                    }
                }
            };

            const handleQuizDecision = (isKnown) => {
                setSwipeDirection(isKnown ? 'right' : 'left');
                if (!isKnown) setNeedsReview(true);
                setTimeout(() => {
                    setSwipeDirection('none');
                    setPhase('reveal');
                }, 180);
            };

            const handleRevealDecision = (rememberedCorrectly) => {
                setSwipeDirection(rememberedCorrectly ? 'right' : 'left');
                setTimeout(() => {
                    setSwipeDirection('none');
                    advanceSenseOrWord(!rememberedCorrectly);
                }, 180);
            };

            let cardStyle = "bg-white border-slate-100 shadow-xl";
            if (swipeDirection === 'left') cardStyle = "bg-red-50 border-red-300 scale-[0.98] shadow-md";
            if (swipeDirection === 'right') cardStyle = "bg-emerald-50 border-emerald-300 scale-[0.98] shadow-md";

            return (
                <div className="min-h-screen flex flex-col justify-between bg-gradient-to-b from-slate-50 to-slate-100">
                    <header className="max-w-5xl w-full mx-auto px-6 py-6 flex justify-between items-center">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white font-bold animate-pulse">I</div>
                            <span className="text-xl font-bold tracking-tight text-slate-800">IELTS ContextVocab</span>
                        </div>
                        <div className="text-xs font-medium text-slate-400 bg-slate-200/60 px-3 py-1 rounded-full">
                            义项归类 · 语境记忆
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center px-4 max-w-3xl w-full mx-auto">
                        {view === 'home' && (
                            <div className="w-full space-y-6 py-12 animate-fade-in">
                                <div className="text-center space-y-2">
                                    <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">雅思真题全语境刷词系统</h1>
                                    <p className="text-slate-500 text-sm">相似释义归为一类，每义项一例句 · 牛津词典风格</p>
                                </div>
                                <div className="grid gap-4 pt-4">
                                    {Object.keys(BOOK_CONFIG).map((key) => (
                                        <div key={key} onClick={() => !loading && startReview(key)} className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:border-emerald-400 hover:shadow-md cursor-pointer transition-all active:scale-[0.99]">
                                            <div className="flex justify-between items-start">
                                                <h3 className="text-lg font-bold text-slate-800">{BOOK_CONFIG[key].title}</h3>
                                                <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 font-bold rounded">5382 词</span>
                                            </div>
                                            <p className="text-xs text-slate-400 mt-2">{loading ? "⚡ 正在加载词库..." : BOOK_CONFIG[key].desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'review' && currentWord && currentSense && (
                            <div className="w-full flex flex-col items-center space-y-5 py-4 animate-fade-in">
                                <div className="w-full flex justify-between items-center text-xs font-semibold text-slate-400 tracking-wider px-1">
                                    <span>单词 {currentIndex + 1} / {reviewQueue.length}</span>
                                    {currentWord.senses.length > 1 && (
                                        <span>义项 {activeSenseIndex + 1} / {currentWord.senses.length}</span>
                                    )}
                                </div>

                                <div className="w-full min-h-[320px] flex items-center justify-center">
                                    {phase === 'quiz' ? (
                                        <div className={`w-full rounded-3xl p-6 md:p-10 border min-h-[300px] flex flex-col justify-center items-center relative transition-all duration-150 ${cardStyle}`}>
                                            <div className="w-full overflow-hidden mb-4">
                                                <HighlightedSentence sentence={currentSense.sentence} />
                                            </div>
                                            <div className="absolute bottom-4 text-xs text-slate-400 select-none flex space-x-8 md:space-x-12">
                                                <span>← 不认识</span>
                                                <span>认识 →</span>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className={`w-full rounded-3xl p-6 md:p-10 border min-h-[300px] flex flex-col justify-center space-y-5 transition-all duration-150 ${cardStyle}`}>
                                            <div className="w-full overflow-hidden">
                                                <HighlightedSentence sentence={currentSense.sentence} size="md" />
                                            </div>
                                            <div className="border-t border-slate-100 pt-4 space-y-3 animate-fade-in">
                                                <div className="flex items-start space-x-2">
                                                    <span className="text-[10px] font-bold px-1.5 py-0.5 bg-blue-500 text-white rounded mt-0.5 shrink-0">例句释义</span>
                                                    <p className="text-base text-slate-700 leading-snug">{currentSense.translation}</p>
                                                </div>
                                                <div className="flex items-start space-x-2">
                                                    <span className="text-[10px] font-bold px-1.5 py-0.5 bg-emerald-500 text-white rounded mt-0.5 shrink-0">语境释义</span>
                                                    <p className="text-base font-semibold text-emerald-700 leading-snug">
                                                        {currentWord.word}
                                                        <span className="text-slate-400 font-normal mx-1.5">→</span>
                                                        {currentSense.contextMeaning || currentSense.definition}
                                                    </p>
                                                </div>
                                                {currentSense.definition && (
                                                    <p className="text-xs text-slate-400 pl-1">义项：{currentSense.definition}</p>
                                                )}
                                            </div>
                                            <div className="text-xs text-slate-400 text-center select-none flex justify-center space-x-8 pt-1">
                                                <span>← 记错了</span>
                                                <span>记对了 →</span>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {phase === 'quiz' ? (
                                    <div className="grid grid-cols-2 gap-4 w-full max-w-sm pt-2">
                                        <button onClick={() => handleQuizDecision(false)} className="h-12 rounded-xl bg-red-50 hover:bg-red-100 text-red-600 font-medium border border-red-200 transition-colors shadow-sm">
                                            不认识 (←)
                                        </button>
                                        <button onClick={() => handleQuizDecision(true)} className="h-12 rounded-xl bg-emerald-50 hover:bg-emerald-100 text-emerald-600 font-medium border border-emerald-200 transition-colors shadow-sm">
                                            认识 (→)
                                        </button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-4 w-full max-w-sm pt-2">
                                        <button onClick={() => handleRevealDecision(false)} className="h-12 rounded-xl bg-red-50 hover:bg-red-100 text-red-600 font-medium border border-red-200 transition-colors shadow-sm">
                                            记错了 (←)
                                        </button>
                                        <button onClick={() => handleRevealDecision(true)} className="h-12 rounded-xl bg-emerald-50 hover:bg-emerald-100 text-emerald-600 font-medium border border-emerald-200 transition-colors shadow-sm">
                                            记对了 (→)
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
