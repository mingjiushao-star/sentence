<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="sentence 用句子记住单词，并按复习周期自动提醒。">
    <title>sentence - 用句子记住单词</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f8f4;
        }
        button {
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease;
        }
        button:active {
            transform: scale(0.99);
        }
        button:focus-visible, input:focus-visible {
            outline: 3px solid rgba(16, 185, 129, 0.22);
            outline-offset: 2px;
        }
        .animate-fade-in {
            animation: fadeIn 0.18s ease-out forwards;
        }
        .interactive-lift {
            transform: translateY(0);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }
        .interactive-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 70px -38px rgba(15, 23, 42, 0.56);
        }
        .interactive-lift:active {
            transform: translateY(0) scale(0.99);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .word-title {
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: normal;
            line-height: 1.03;
            letter-spacing: 0;
        }
        .sentence-text {
            overflow-wrap: anywhere;
            word-break: normal;
            line-height: 1.6;
        }
        .soft-grid {
            background-image:
                linear-gradient(135deg, rgba(240, 253, 244, 0.92) 0%, rgba(248, 250, 252, 0.96) 48%, rgba(255, 251, 235, 0.9) 100%),
                linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
            background-size: auto, 32px 32px, 32px 32px;
            background-repeat: no-repeat, repeat, repeat;
        }
        .card-surface {
            border: 1px solid rgba(203, 213, 225, 0.78);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 24px 70px -44px rgba(15, 23, 42, 0.5);
        }
        .hero-surface {
            background: linear-gradient(135deg, #ffffff 0%, #f7fcf8 56%, #fff7ed 100%);
        }
        .brand-logo {
            display: block;
            height: 44px;
            width: 44px;
            border-radius: 10px;
            object-fit: cover;
            object-position: center 40%;
            background: #fff;
            box-shadow: 0 10px 28px -18px rgba(2, 44, 34, 0.85);
        }
        .brand-logo:hover {
            transform: rotate(-1deg) scale(1.03);
        }
        .primary-action {
            box-shadow: 0 16px 36px -22px rgba(15, 23, 42, 0.8);
        }
        .primary-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 44px -24px rgba(15, 23, 42, 0.85);
        }
    </style>
</head>
<body class="text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const WORDS_FILE = "words.json";
        const STORAGE_KEY = "sentence.progress.v4";
        const LEGACY_STORAGE_KEYS = ["contextvocab.progress.v3"];
        const GROUP_SIZE = 10;
        const REVIEW_STEPS = [
            { label: "1 天", ms: 24 * 60 * 60 * 1000 },
            { label: "2 天", ms: 2 * 24 * 60 * 60 * 1000 },
            { label: "4 天", ms: 4 * 24 * 60 * 60 * 1000 },
            { label: "7 天", ms: 7 * 24 * 60 * 60 * 1000 },
            { label: "15 天", ms: 15 * 24 * 60 * 60 * 1000 },
            { label: "30 天", ms: 30 * 24 * 60 * 60 * 1000 },
            { label: "60 天", ms: 60 * 24 * 60 * 60 * 1000 }
        ];

        function defaultProgress() {
            return {
                nextNewIndex: 0,
                sessionsCompleted: 0,
                updatedAt: Date.now(),
                words: {},
                history: [],
                sessions: []
            };
        }

        function normalizeProgress(value) {
            return {
                ...defaultProgress(),
                ...(value || {}),
                words: (value && value.words && typeof value.words === "object") ? value.words : {},
                history: Array.isArray(value?.history) ? value.history : [],
                sessions: Array.isArray(value?.sessions) ? value.sessions : []
            };
        }

        function limitHistory(items, limit = 3000) {
            return items.length > limit ? items.slice(items.length - limit) : items;
        }

        function readProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) return normalizeProgress(JSON.parse(saved));

                for (const key of LEGACY_STORAGE_KEYS) {
                    const legacy = localStorage.getItem(key);
                    if (legacy) return normalizeProgress(JSON.parse(legacy));
                }

                return defaultProgress();
            } catch (error) {
                return defaultProgress();
            }
        }

        function wordKey(word) {
            return String(word || "").trim().toLowerCase();
        }

        function splitExample(example = "") {
            const text = String(example).replace(/\s+/g, " ").trim();
            if (!text) return { english: "", translation: "" };

            const bracketMatch = text.match(/^(.*?)[\uFF08(]([^()\uFF08\uFF09]*[\u4e00-\u9fa5][^()\uFF08\uFF09]*)[\uFF09)]\s*$/);
            if (bracketMatch) {
                return {
                    english: bracketMatch[1].trim(),
                    translation: bracketMatch[2].trim()
                };
            }

            const chars = Array.from(text);
            const firstChineseIndex = chars.findIndex(char => /[\u4e00-\u9fa5]/.test(char));
            if (firstChineseIndex > 0) {
                const englishPrefix = chars.slice(0, firstChineseIndex).join("").replace(/[\uFF08(]\s*$/, "").trim();
                if (/[A-Za-z]/.test(englishPrefix)) {
                    return {
                        english: englishPrefix,
                        translation: chars.slice(firstChineseIndex).join("").replace(/^[\uFF09)]?\s*/, "").trim()
                    };
                }
            }

            const quotedSentence = text.match(/["“]([^"”]*[A-Za-z][^"”]*[.!?][^"”]*)["”]/);
            if (quotedSentence) {
                return {
                    english: quotedSentence[1].trim(),
                    translation: text
                };
            }

            const embeddedSentence = text.match(/\b[A-Z][A-Za-z0-9 ,;:'’"-]+(?:[.!?]|(?=\s*[\uFF08(]))/);
            if (embeddedSentence) {
                return {
                    english: embeddedSentence[0].trim(),
                    translation: text
                };
            }

            return { english: text, translation: "" };
        }

        function prepareWord(item) {
            const parsed = splitExample(item.example);
            const storedTranslation = String(item.exampleTranslation || item.exampleMeaning || "").replace(/\s+/g, " ").trim();
            return {
                page: item.page,
                index: item.index,
                word: String(item.word || "").trim(),
                meaning: String(item.meaning || "").trim(),
                example: String(item.example || "").replace(/\s+/g, " ").trim(),
                englishExample: parsed.english,
                exampleTranslation: storedTranslation || parsed.translation
            };
        }

        function formatRelativeTime(timestamp, now = Date.now()) {
            if (!timestamp) return "未安排";
            const diff = timestamp - now;
            if (diff <= 0) return "现在";

            const minute = 60 * 1000;
            const hour = 60 * minute;
            const day = 24 * hour;

            if (diff < hour) return `${Math.ceil(diff / minute)} 分钟后`;
            if (diff < day) return `${Math.ceil(diff / hour)} 小时后`;
            return `${Math.ceil(diff / day)} 天后`;
        }

        function stageLabel(level) {
            if (typeof level !== "number" || level < 0) return "未稳定";
            return REVIEW_STEPS[Math.min(level, REVIEW_STEPS.length - 1)].label;
        }

        function wordSizeClass(word) {
            const length = Array.from(String(word || "")).length;
            if (length <= 9) return "text-6xl md:text-7xl";
            if (length <= 15) return "text-5xl md:text-6xl";
            if (length <= 24) return "text-4xl md:text-5xl";
            return "text-3xl md:text-4xl";
        }

        function ProgressBar({ value }) {
            return (
                <div className="h-2 w-full rounded-full bg-slate-200 overflow-hidden">
                    <div className="h-full bg-emerald-500 transition-all" style={{ width: `${Math.max(0, Math.min(100, value))}%` }} />
                </div>
            );
        }

        function StatCard({ label, value, detail }) {
            return (
                <div className="interactive-lift rounded-lg border border-slate-200 bg-white p-4">
                    <div className="text-xs font-semibold text-slate-400">{label}</div>
                    <div className="mt-2 text-2xl font-extrabold text-slate-900">{value}</div>
                    {detail && <div className="mt-1 text-xs text-slate-500">{detail}</div>}
                </div>
            );
        }

        function WordTitle({ word, compact = false }) {
            return (
                <h2 className={`word-title text-center font-extrabold text-slate-950 ${compact ? wordSizeClass(word).replace("text-6xl", "text-5xl").replace("md:text-7xl", "md:text-6xl") : wordSizeClass(word)}`}>
                    {word}
                </h2>
            );
        }

        function escapeRegExp(value) {
            return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function HighlightedSentence({ text, word, className = "" }) {
            const sentence = String(text || "");
            const target = String(word || "").trim();

            if (!target) {
                return <p className={className}>{sentence}</p>;
            }

            const pattern = new RegExp(`(${escapeRegExp(target)})`, "gi");
            const parts = sentence.split(pattern);
            const targetLower = target.toLowerCase();

            return (
                <p className={className}>
                    {parts.map((part, index) => (
                        part.toLowerCase() === targetLower
                            ? <span key={`${part}-${index}`} className="font-extrabold text-green-600">{part}</span>
                            : <React.Fragment key={`${part}-${index}`}>{part}</React.Fragment>
                    ))}
                </p>
            );
        }

        function App() {
            const [view, setView] = React.useState("home");
            const [allWords, setAllWords] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [progress, setProgress] = React.useState(readProgress);
            const [now, setNow] = React.useState(Date.now());
            const [session, setSession] = React.useState(null);
            const [completedSession, setCompletedSession] = React.useState(null);
            const [browseQuery, setBrowseQuery] = React.useState("");

            const saveProgress = React.useCallback((updater) => {
                setProgress(previous => {
                    const base = normalizeProgress(previous);
                    const next = normalizeProgress(typeof updater === "function" ? updater(base) : updater);
                    next.updatedAt = Date.now();
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
                    return next;
                });
            }, []);

            const loadWords = async () => {
                if (allWords.length) return allWords;

                setLoading(true);
                try {
                    const response = await fetch(WORDS_FILE);
                    if (!response.ok) throw new Error("加载词库失败：请确认 words.json 和 index.html 在同一个文件夹里。");

                    const data = await response.json();
                    const prepared = data
                        .filter(item => item.word && item.meaning && item.example)
                        .map(prepareWord);

                    setAllWords(prepared);
                    return prepared;
                } catch (error) {
                    alert(error.message + "\n\n如果直接双击 HTML 后无法加载，请用本地服务器打开这个文件夹。");
                    return [];
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                loadWords();
            }, []);

            React.useEffect(() => {
                const timer = setInterval(() => setNow(Date.now()), 60 * 1000);
                return () => clearInterval(timer);
            }, []);

            const progressWords = progress.words || {};
            const learnedCount = allWords.filter(item => progressWords[wordKey(item.word)]?.learnedAt).length;
            const archivedCount = allWords.filter(item => progressWords[wordKey(item.word)]?.archivedAt).length;
            const dueWords = React.useMemo(() => {
                return allWords
                    .filter(item => {
                        const record = progressWords[wordKey(item.word)];
                        return record?.dueAt && record.dueAt <= now && !record.archivedAt;
                    })
                    .sort((a, b) => (progressWords[wordKey(a.word)]?.dueAt || 0) - (progressWords[wordKey(b.word)]?.dueAt || 0));
            }, [allWords, progress, now]);
            const nextNewIndex = Math.min(progress.nextNewIndex || 0, allWords.length);
            const remainingNew = Math.max(allWords.length - nextNewIndex, 0);
            const learnedPercent = allWords.length ? (learnedCount / allWords.length) * 100 : 0;
            const learnedPercentText = learnedPercent.toFixed(2);

            const startStudyGroup = async (forcedStart = null) => {
                const words = await loadWords();
                if (!words.length) return;

                const start = Math.max(0, Math.min(typeof forcedStart === "number" ? forcedStart : (progress.nextNewIndex || 0), words.length));
                const group = words.slice(start, start + GROUP_SIZE);

                if (!group.length) {
                    alert("新词已经学完了，可以去复习或浏览词库。");
                    return;
                }

                setSession({
                    type: "learn",
                    phase: "quiz",
                    groupStart: start,
                    originalCount: group.length,
                    words: group,
                    cursor: 0,
                    lastGuess: null,
                    failedKeys: {},
                    results: { correct: 0, wrong: 0 }
                });
                setCompletedSession(null);
                setView("session");
            };

            const startDueReview = async () => {
                const words = await loadWords();
                if (!words.length) return;

                const due = words
                    .filter(item => {
                        const record = progress.words?.[wordKey(item.word)];
                        return record?.dueAt && record.dueAt <= Date.now() && !record.archivedAt;
                    })
                    .sort((a, b) => (progress.words?.[wordKey(a.word)]?.dueAt || 0) - (progress.words?.[wordKey(b.word)]?.dueAt || 0))
                    .slice(0, GROUP_SIZE);

                if (!due.length) {
                    alert("现在没有到期复习的单词。");
                    return;
                }

                setSession({
                    type: "review",
                    phase: "quiz",
                    groupStart: 0,
                    originalCount: due.length,
                    words: due,
                    cursor: 0,
                    lastGuess: null,
                    failedKeys: {},
                    results: { correct: 0, wrong: 0 }
                });
                setCompletedSession(null);
                setView("session");
            };

            const openBrowse = async () => {
                const words = await loadWords();
                if (!words.length) return;

                setBrowseQuery("");
                setView("browse");
            };

            const resetProgress = () => {
                if (!window.confirm("确定要清空学习进度吗？词库文件不会被修改。")) return;
                const fresh = defaultProgress();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
                LEGACY_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
                setProgress(fresh);
                setSession(null);
                setCompletedSession(null);
                setView("home");
            };

            const activeWord = session?.words?.[session.cursor];

            const exitSession = () => {
                if (!session || window.confirm("确定返回首页吗？当前这一组的未完成部分不会继续保留。")) {
                    setSession(null);
                    setView("home");
                }
            };

            const showAnswer = (knows) => {
                setSession(previous => previous ? { ...previous, phase: "reveal", lastGuess: knows } : previous);
            };

            const recordWordResult = (word, remembered, type, resetCycle = false) => {
                saveProgress(previous => {
                    const timestamp = Date.now();
                    const key = wordKey(word.word);
                    const oldRecord = previous.words[key] || {};
                    let level = typeof oldRecord.level === "number" ? oldRecord.level : -1;
                    const levelBefore = level;
                    let dueAt = oldRecord.dueAt || 0;
                    let learnedAt = oldRecord.learnedAt;

                    let archivedAt = oldRecord.archivedAt || 0;

                    if (remembered) {
                        if (resetCycle) level = -1;
                        const nextLevel = level + 1;
                        learnedAt = learnedAt || timestamp;
                        if (nextLevel >= REVIEW_STEPS.length) {
                            level = REVIEW_STEPS.length;
                            dueAt = 0;
                            archivedAt = timestamp;
                        } else {
                            level = nextLevel;
                            dueAt = timestamp + REVIEW_STEPS[level].ms;
                            archivedAt = 0;
                        }
                    }

                    const event = {
                        time: timestamp,
                        word: word.word,
                        key,
                        type,
                        remembered,
                        resetCycle,
                        levelBefore,
                        levelAfter: level,
                        dueAt,
                        archivedAt
                    };
                    const wordReviews = Array.isArray(oldRecord.reviews) ? oldRecord.reviews : [];

                    return {
                        ...previous,
                        words: {
                            ...previous.words,
                            [key]: {
                                ...oldRecord,
                                word: word.word,
                                level,
                                dueAt,
                                learnedAt,
                                archivedAt,
                                lastReviewedAt: timestamp,
                                correct: (oldRecord.correct || 0) + (remembered ? 1 : 0),
                                wrong: (oldRecord.wrong || 0) + (remembered ? 0 : 1),
                                reviews: limitHistory([...wordReviews, event], 80)
                            }
                        },
                        history: limitHistory([...(previous.history || []), event])
                    };
                });
            };

            const completeSession = (nextSession) => {
                const completedAt = Date.now();
                const sessionRecord = {
                    time: completedAt,
                    type: nextSession.type,
                    originalCount: nextSession.originalCount,
                    correct: nextSession.results.correct,
                    wrong: nextSession.results.wrong,
                    words: nextSession.words.slice(0, nextSession.cursor).map(item => item.word)
                };

                if (nextSession.type === "learn") {
                    saveProgress(previous => ({
                        ...previous,
                        nextNewIndex: Math.max(previous.nextNewIndex || 0, nextSession.groupStart + nextSession.originalCount),
                        sessionsCompleted: (previous.sessionsCompleted || 0) + 1,
                        lastSessionAt: completedAt,
                        sessions: limitHistory([...(previous.sessions || []), sessionRecord], 500)
                    }));
                } else {
                    saveProgress(previous => ({
                        ...previous,
                        sessionsCompleted: (previous.sessionsCompleted || 0) + 1,
                        lastSessionAt: completedAt,
                        sessions: limitHistory([...(previous.sessions || []), sessionRecord], 500)
                    }));
                }

                setCompletedSession(nextSession);
                setSession(null);
                setView("done");
            };

            const submitRecall = (remembered) => {
                if (!session || !activeWord) return;

                const activeKey = wordKey(activeWord.word);
                const hadFailedInSession = Boolean(session.failedKeys?.[activeKey]);
                recordWordResult(activeWord, remembered, session.type, remembered && hadFailedInSession);

                const nextWords = remembered ? session.words : [...session.words, activeWord];
                const nextCursor = session.cursor + 1;
                const nextCorrect = session.results.correct + (remembered ? 1 : 0);
                const nextFailedKeys = remembered
                    ? (session.failedKeys || {})
                    : { ...(session.failedKeys || {}), [activeKey]: true };
                const nextSession = {
                    ...session,
                    words: nextWords,
                    cursor: nextCursor,
                    phase: "quiz",
                    lastGuess: null,
                    failedKeys: nextFailedKeys,
                    results: {
                        correct: nextCorrect,
                        wrong: session.results.wrong + (remembered ? 0 : 1)
                    }
                };

                if (nextCorrect >= session.originalCount) {
                    completeSession(nextSession);
                } else {
                    setSession(nextSession);
                }
            };

            React.useEffect(() => {
                const handleKeyDown = (event) => {
                    if (view !== "session" || !session || !activeWord) return;

                    const target = event.target;
                    const tagName = target?.tagName;
                    if (tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT" || target?.isContentEditable) return;

                    if (event.key === "ArrowRight") {
                        event.preventDefault();
                        if (session.phase === "quiz") showAnswer(true);
                        if (session.phase === "reveal") submitRecall(session.lastGuess ? true : false);
                    }

                    if (event.key === "ArrowLeft") {
                        event.preventDefault();
                        if (session.phase === "quiz") showAnswer(false);
                        if (session.phase === "reveal") submitRecall(false);
                    }
                };

                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, [view, session, activeWord]);

            const filteredWords = React.useMemo(() => {
                const query = browseQuery.trim().toLowerCase();
                if (!query) return allWords;

                return allWords.filter(item => (
                    item.word.toLowerCase().includes(query) ||
                    item.meaning.toLowerCase().includes(query) ||
                    item.example.toLowerCase().includes(query)
                ));
            }, [allWords, browseQuery]);

            const getBrowseStatus = (item) => {
                const record = progressWords[wordKey(item.word)];
                if (!record?.learnedAt) return { label: "未学", tone: "slate" };
                if (record.archivedAt) return { label: "已归档", tone: "emerald" };
                if (record.dueAt && record.dueAt <= now) return { label: "待复习", tone: "amber" };
                return { label: `${stageLabel(record.level)} · ${formatRelativeTime(record.dueAt, now)}`, tone: "emerald" };
            };

            const sessionPosition = session ? Math.min(session.results.correct, session.originalCount) : 0;
            const sessionProgress = session ? (sessionPosition / Math.max(session.originalCount, 1)) * 100 : 0;

            return (
                <div className="min-h-screen soft-grid">
                    <header className="sticky top-0 z-20 border-b border-slate-200/80 bg-white/90 backdrop-blur">
                        <div className="mx-auto flex max-w-6xl items-center justify-between gap-4 px-5 py-4">
                            <button onClick={() => setView("home")} className="interactive-lift flex min-w-0 items-center gap-2 rounded-lg text-left">
                                <img src="logo.png" alt="sentence logo" className="brand-logo shrink-0" />
                                <div className="min-w-0">
                                    <div className="truncate text-sm font-extrabold text-slate-950">sentence</div>
                                    <div className="text-[11px] font-medium text-slate-400">Learn words in sentence</div>
                                </div>
                            </button>
                            <div className="flex items-center gap-2">
                                <button onClick={openBrowse} className="h-9 rounded-lg border border-slate-200 bg-white px-3 text-sm font-semibold text-slate-600 transition hover:border-slate-400">
                                    浏览
                                </button>
                                <button onClick={() => startDueReview()} className="relative h-9 rounded-lg border border-slate-200 bg-white px-3 text-sm font-semibold text-slate-600 transition hover:border-amber-400">
                                    复习
                                    {dueWords.length > 0 && (
                                        <span className="ml-1 rounded-full bg-amber-500 px-1.5 py-0.5 text-[10px] font-extrabold text-white">{dueWords.length}</span>
                                    )}
                                </button>
                                <button onClick={() => startStudyGroup()} className="primary-action h-9 rounded-lg bg-slate-950 px-3 text-sm font-semibold text-white transition hover:bg-slate-800">
                                    学习
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="mx-auto w-full max-w-6xl px-5 py-6">
                        {view === "home" && (
                            <div className="animate-fade-in space-y-6">
                                {dueWords.length > 0 && (
                                    <section className="card-surface rounded-lg border-amber-200 bg-amber-50 px-5 py-4">
                                        <div className="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                                            <div>
                                                <div className="text-xs font-bold uppercase tracking-[0.18em] text-amber-600">Review due</div>
                                                <p className="mt-1 text-sm font-semibold text-slate-800">
                                                    有 {dueWords.length} 个单词到期复习，打开网站后会自动显示在这里。
                                                </p>
                                            </div>
                                            <button onClick={() => startDueReview()} className="primary-action h-10 rounded-lg bg-amber-500 px-4 text-sm font-bold text-white transition hover:bg-amber-600">
                                                开始复习
                                            </button>
                                        </div>
                                    </section>
                                )}
                                <section className="grid gap-4 lg:grid-cols-[1.15fr_0.85fr]">
                                    <div className="card-surface hero-surface rounded-lg p-6 md:p-8">
                                        <div className="text-xs font-bold uppercase tracking-[0.18em] text-emerald-600">sentence</div>
                                        <h1 className="mt-3 max-w-2xl text-3xl font-extrabold tracking-normal text-slate-950 md:text-5xl">
                                            用句子记住单词。
                                        </h1>
                                        <p className="mt-4 max-w-2xl text-sm leading-6 text-slate-500">
                                            每组 10 个词。先读句子判断熟悉度，再查看释义确认记忆；背过的词会自动进入复习队列，到期后继续提醒。
                                        </p>
                                        <div className="mt-6 flex flex-wrap gap-3">
                                            <button onClick={() => startStudyGroup()} disabled={loading || !remainingNew} className="primary-action h-11 rounded-lg bg-slate-950 px-5 text-sm font-bold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-40">
                                                学习新的一组
                                            </button>
                                            <button onClick={() => startDueReview()} disabled={loading || !dueWords.length} className="h-11 rounded-lg border border-slate-200 bg-white px-5 text-sm font-bold text-slate-700 transition hover:border-amber-400 disabled:cursor-not-allowed disabled:opacity-40">
                                                复习到期单词
                                            </button>
                                            <button onClick={openBrowse} className="h-11 rounded-lg border border-slate-200 bg-white px-5 text-sm font-bold text-slate-700 transition hover:border-emerald-400">
                                                浏览词库
                                            </button>
                                        </div>
                                    </div>

                                    <div className="card-surface rounded-lg p-6">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <div className="text-xs font-semibold text-slate-400">学习进度</div>
                                                <div className="mt-1 text-2xl font-extrabold text-slate-950">{learnedPercentText}%</div>
                                            </div>
                                            <div className="text-right text-xs text-slate-400">
                                                <div>{learnedCount} / {allWords.length || 5550}</div>
                                                <div>{archivedCount} 个已归档</div>
                                                <button onClick={resetProgress} className="mt-1 font-semibold text-slate-400 hover:text-red-500">重置进度</button>
                                            </div>
                                        </div>
                                        <div className="mt-4">
                                            <ProgressBar value={learnedPercent} />
                                        </div>
                                        <div className="mt-5 grid grid-cols-2 gap-2">
                                            <StatCard label="已学习单词" value={learnedCount} detail="进入复习队列" />
                                            <StatCard label="未学习单词" value={remainingNew} detail="等待学习" />
                                        </div>
                                    </div>
                                </section>

                                <section className="grid gap-4 md:grid-cols-2">
                                    <button onClick={() => startStudyGroup()} className="card-surface interactive-lift rounded-lg p-5 text-left transition hover:border-slate-400 hover:shadow-sm">
                                        <div className="text-sm font-extrabold text-slate-950">学习环节</div>
                                        <p className="mt-2 text-sm leading-6 text-slate-500">先看句子，判断认识或不认识；不认识也会进入释义页，再排到本组后面重测。</p>
                                    </button>
                                    <button onClick={() => startDueReview()} className="card-surface interactive-lift rounded-lg p-5 text-left transition hover:border-amber-400 hover:shadow-sm">
                                        <div className="text-sm font-extrabold text-slate-950">复习环节</div>
                                        <p className="mt-2 text-sm leading-6 text-slate-500">背过的词自动排入复习队列；逾期词会持续堆积，记错后重新开始周期。</p>
                                    </button>
                                </section>
                            </div>
                        )}

                        {view === "session" && session && activeWord && (
                            <div className="animate-fade-in mx-auto max-w-3xl space-y-5">
                                <div className="card-surface rounded-lg p-4">
                                    <div className="flex flex-wrap items-center justify-between gap-3">
                                        <button onClick={exitSession} className="h-9 rounded-lg border border-slate-200 bg-white px-3 text-sm font-bold text-slate-600 transition hover:border-slate-400">
                                            返回首页
                                        </button>
                                        <div className="text-xs font-semibold text-slate-400">
                                            {session.type === "learn" ? "学习新词" : "到期复习"} · 已记对 {sessionPosition} / {session.originalCount}
                                        </div>
                                    </div>
                                    <div className="mt-3">
                                        <ProgressBar value={sessionProgress} />
                                    </div>
                                </div>

                                {session.phase === "quiz" && (
                                    <section className="card-surface rounded-lg p-6 md:p-8">
                                        <div className="text-center">
                                            <div className="text-xs font-bold text-slate-400">{session.type === "learn" ? "新词判断" : "复习判断"}</div>
                                            <div className="mt-5">
                                                <WordTitle word={activeWord.word} compact />
                                            </div>
                                            <HighlightedSentence
                                                text={activeWord.englishExample || activeWord.example}
                                                word={activeWord.word}
                                                className="sentence-text mx-auto mt-7 max-w-2xl text-lg font-semibold text-slate-700 md:text-xl"
                                            />
                                        </div>
                                        <div className="mt-8 grid grid-cols-2 gap-3">
                                            <button onClick={() => showAnswer(false)} className="h-12 rounded-lg border border-red-200 bg-red-50 text-sm font-bold text-red-600 transition hover:bg-red-100">
                                                不认识
                                            </button>
                                            <button onClick={() => showAnswer(true)} className="h-12 rounded-lg border border-emerald-200 bg-emerald-50 text-sm font-bold text-emerald-700 transition hover:bg-emerald-100">
                                                认识
                                            </button>
                                        </div>
                                    </section>
                                )}

                                {session.phase === "reveal" && (
                                    <section className="card-surface rounded-lg p-6 md:p-8">
                                        <div className="text-center">
                                            <WordTitle word={activeWord.word} compact />
                                        </div>
                                        <div className="mt-7 space-y-4 border-t border-slate-100 pt-5">
                                            <div className="flex items-start gap-3">
                                                <span className="mt-0.5 rounded-md bg-emerald-500 px-2 py-1 text-[11px] font-bold text-white">释义</span>
                                                <p className="text-base font-semibold leading-7 text-emerald-700">{activeWord.meaning}</p>
                                            </div>
                                            <div className="flex items-start gap-3">
                                                <span className="mt-0.5 rounded-md bg-slate-900 px-2 py-1 text-[11px] font-bold text-white">例句</span>
                                                <HighlightedSentence
                                                    text={activeWord.example}
                                                    word={activeWord.word}
                                                    className="sentence-text text-base text-slate-700"
                                                />
                                            </div>
                                            {activeWord.exampleTranslation && (
                                                <div className="flex items-start gap-3">
                                                    <span className="mt-0.5 rounded-md bg-blue-500 px-2 py-1 text-[11px] font-bold text-white">释义</span>
                                                    <p className="text-base leading-7 text-slate-600">{activeWord.exampleTranslation}</p>
                                                </div>
                                            )}
                                        </div>
                                        {session.lastGuess ? (
                                            <div className="mt-7 grid gap-3 sm:grid-cols-[0.8fr_1fr_1fr]">
                                                <button onClick={() => setSession(previous => previous ? { ...previous, phase: "quiz", lastGuess: null } : previous)} className="h-12 rounded-lg border border-slate-200 bg-white text-sm font-bold text-slate-600 transition hover:border-slate-400">
                                                    返回句子
                                                </button>
                                                <button onClick={() => submitRecall(false)} className="h-12 rounded-lg border border-red-200 bg-red-50 text-sm font-bold text-red-600 transition hover:bg-red-100">
                                                    记错了
                                                </button>
                                                <button onClick={() => submitRecall(true)} className="h-12 rounded-lg border border-emerald-200 bg-emerald-50 text-sm font-bold text-emerald-700 transition hover:bg-emerald-100">
                                                    记对了
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="mt-7 grid gap-3 sm:grid-cols-[0.8fr_1.2fr]">
                                                <button onClick={() => setSession(previous => previous ? { ...previous, phase: "quiz", lastGuess: null } : previous)} className="h-12 rounded-lg border border-slate-200 bg-white text-sm font-bold text-slate-600 transition hover:border-slate-400">
                                                    返回句子
                                                </button>
                                                <button onClick={() => submitRecall(false)} className="h-12 rounded-lg bg-slate-950 text-sm font-bold text-white transition hover:bg-slate-800">
                                                    下一个
                                                </button>
                                            </div>
                                        )}
                                    </section>
                                )}
                            </div>
                        )}

                        {view === "done" && completedSession && (
                            <div className="card-surface animate-fade-in mx-auto max-w-xl rounded-lg p-7 text-center">
                                <div className="text-xs font-bold uppercase tracking-[0.18em] text-emerald-600">Group complete</div>
                                <h1 className="mt-3 text-3xl font-extrabold text-slate-950">
                                    {completedSession.type === "learn" ? "这一组学完了" : "这一组复习完了"}
                                </h1>
                                <div className="mt-6 grid grid-cols-2 gap-3">
                                    <StatCard label="记对了" value={completedSession.results.correct} detail="本组作答" />
                                    <StatCard label="记错了" value={completedSession.results.wrong} detail="已排到组末重测" />
                                </div>
                                <div className="mt-7 grid grid-cols-2 gap-3">
                                    <button onClick={() => setView("home")} className="h-12 rounded-lg border border-slate-200 bg-white text-sm font-bold text-slate-700 transition hover:border-slate-400">
                                        返回首页
                                    </button>
                                    <button
                                        onClick={() => completedSession.type === "learn" ? startStudyGroup(completedSession.groupStart + completedSession.originalCount) : startDueReview()}
                                        className="h-12 rounded-lg bg-slate-950 text-sm font-bold text-white transition hover:bg-slate-800"
                                    >
                                        {completedSession.type === "learn" ? "下一组" : "继续复习"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === "browse" && (
                            <div className="animate-fade-in space-y-4">
                                <section className="card-surface sticky top-20 z-10 rounded-lg p-4 backdrop-blur">
                                    <div className="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                                        <div className="flex flex-col gap-3 sm:flex-row sm:items-center">
                                            <button onClick={() => setView("home")} className="h-10 rounded-lg border border-slate-200 bg-white px-3 text-sm font-bold text-slate-600 transition hover:border-slate-400">
                                                返回首页
                                            </button>
                                            <div>
                                                <h1 className="text-2xl font-extrabold text-slate-950">浏览整本词库</h1>
                                                <p className="mt-1 text-xs font-medium text-slate-400">共 {allWords.length || 5550} 个单词，当前显示 {filteredWords.length} 个</p>
                                            </div>
                                        </div>
                                        <input
                                            value={browseQuery}
                                            onChange={event => setBrowseQuery(event.target.value)}
                                            placeholder="搜索单词、释义或例句"
                                            className="h-11 w-full rounded-lg border border-slate-200 bg-white px-4 text-sm outline-none transition focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100 md:w-96"
                                        />
                                    </div>
                                </section>

                                <section className="grid gap-3">
                                    {filteredWords.map((item, idx) => {
                                        const status = getBrowseStatus(item);
                                        const toneClass = status.tone === "amber"
                                            ? "bg-amber-50 text-amber-700 border-amber-200"
                                            : status.tone === "emerald"
                                                ? "bg-emerald-50 text-emerald-700 border-emerald-200"
                                                : "bg-slate-50 text-slate-500 border-slate-200";

                                        return (
                                            <div key={`${item.word}-${idx}`} className="card-surface interactive-lift rounded-lg p-4">
                                                <div className="grid gap-3 md:grid-cols-[220px_1fr] md:gap-6">
                                                    <div className="min-w-0">
                                                        <div className="mb-2 flex flex-wrap items-center gap-2">
                                                            <span className="text-[11px] font-bold text-slate-400">{item.page ? `P${item.page}` : "WORD"} {item.index ? `#${item.index}` : ""}</span>
                                                            <span className={`rounded-md border px-2 py-0.5 text-[11px] font-bold ${toneClass}`}>{status.label}</span>
                                                        </div>
                                                        <h2 className="word-title text-2xl font-extrabold text-slate-950">{item.word}</h2>
                                                    </div>
                                                    <div className="min-w-0 space-y-2">
                                                        <p className="text-sm font-semibold leading-6 text-emerald-700">{item.meaning}</p>
                                                        <p className="sentence-text text-sm text-slate-600">{item.example}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </section>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
